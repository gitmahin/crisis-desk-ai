name: Crsis AI

services:
  swagger-ui:
    build:
      context: .
      dockerfile: ./oas/Dockerfile
    container_name: crsdeskai-swagger
    ports:
      - "8005:8080"
  postgres:
    image: postgres:latest
    container_name: crsai-postgres
    ports:
      - 5432:5432
    networks:
      - crsai
    volumes:
      - crsai_pgData:/var/lib/postgresql/MAJOR/docker
    environment:
      - POSTGRES_PASSWORD=postgres
  redis:
    image: redis:latest
    container_name: crsai-redis-server
    ports:
      - 6379:6379
    networks:
      - crsai
    volumes:
      - crsai_redis:/data
  redis_insight:
    depends_on:
      - "redis"
    image: redis/redisinsight:latest
    container_name: crsai-redisinsight
    volumes:
      - crsai_redisinsight:/data
    ports:
      - 5540:5540
    networks:
      - crsai
    environment:
      - RI_REDIS_HOST_0=crsai-redis-server
      - RI_REDIS_PORT_0=6379
      - RI_REDIS_USERNAME_0=default
      - RI_REDIS_PASSWORD_0=default

networks:
  crsai:
    driver: bridge

volumes:
  crsai_pgData:
  crsai_redis:
  crsai_redisinsight:
